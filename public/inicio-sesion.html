<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Probit - Iniciar sesión</title>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet" />
    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <!-- Tailwind Config from Design System -->
    <script src="assets/js/tailwind.config.js"></script>
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="icon" type="image/png" href="assets/img/logo.png">
</head>

<body
    class="bg-background text-on-surface font-body-md antialiased min-h-screen flex flex-col justify-center items-center p-container-padding relative">
    
    <!-- Botón Volver -->
    <a href="index.html" class="absolute top-4 left-4 md:top-8 md:left-8 flex items-center gap-2 text-on-surface-variant hover:text-primary transition-colors p-2 rounded-full" aria-label="Volver al inicio">
        <span class="material-symbols-outlined">arrow_back</span>
        <span class="hidden sm:inline font-label-md text-label-md font-medium">Volver</span>
    </a>
    <!-- Transactional Screen: Navigation Shell Suppressed -->
    <!-- Main Content Canvas -->
    <main class="w-full max-w-[440px] mx-auto">
        <!-- Login Card -->
        <div
            class="bg-surface-container-lowest rounded-xl border border-outline-variant p-stack-lg md:p-12 shadow-[0_4px_12px_rgba(0,0,0,0.02)] flex flex-col items-center text-center">
            <!-- Logo -->
            <div
                class="mb-stack-md w-20 h-20 md:w-24 md:h-24 rounded-2xl overflow-hidden flex-shrink-0 bg-surface-container-low flex items-center justify-center">
                <img alt="Probit Logo" class="w-full h-full object-contain p-2" src="assets/img/logo.png" />
            </div>
            <!-- Header -->
            <div class="mb-stack-lg w-full">
                <h1 class="text-headline-lg-mobile md:text-headline-lg font-headline-lg text-on-surface mb-unit">
                    Bienvenido de nuevo
                </h1>
                <p class="text-body-md font-body-md text-on-surface-variant">
                    Continúa con tu progreso, un bit a la vez.
                </p>
            </div>
            <!-- Form -->
            <form id="loginForm" class="w-full flex flex-col text-left space-y-stack-md">
                <!-- Email Field -->
                <div class="flex flex-col">
                    <label class="text-label-md font-label-md text-on-surface mb-unit" for="email">
                        Correo electrónico
                    </label>
                    <div class="relative focus-glow rounded-lg transition-all duration-200">
                        <input
                            class="w-full bg-surface border border-outline-variant rounded-lg px-4 py-3 text-body-md text-on-surface placeholder:text-on-surface-variant/50 appearance-none focus:outline-none focus:ring-0 focus:border-transparent transition-colors"
                            id="email" name="email" placeholder="tu@correo.com" required="" type="email" />
                    </div>
                </div>
                <!-- Password Field -->
                <div class="flex flex-col">
                    <div class="flex justify-between items-center mb-unit">
                        <label class="text-label-md font-label-md text-on-surface" for="password">
                            Contraseña
                        </label>
                        <a class="text-label-sm font-label-sm text-primary hover:text-primary-fixed-dim transition-colors"
                            href="#">
                            ¿Olvidaste tu contraseña?
                        </a>
                    </div>
                    <div class="relative focus-glow rounded-lg transition-all duration-200">
                        <input
                            class="w-full bg-surface border border-outline-variant rounded-lg px-4 py-3 text-body-md text-on-surface placeholder:text-on-surface-variant/50 appearance-none focus:outline-none focus:ring-0 focus:border-transparent transition-colors"
                            id="password" name="password" placeholder="••••••••" required="" type="password" />
                    </div>
                </div>
                <!-- Primary Action -->
                <div class="pt-stack-sm">
                    <button
                        class="w-full bg-primary-container text-on-primary-container hover:bg-primary hover:text-on-primary text-label-md font-label-md font-semibold py-4 rounded-lg transition-all duration-200 flex justify-center items-center group"
                        type="submit">
                        <span>Iniciar sesión</span>
                        <span
                            class="material-symbols-outlined ml-2 opacity-0 group-hover:opacity-100 transform -translate-x-2 group-hover:translate-x-0 transition-all duration-200"
                            style="font-size: 20px;">
                            arrow_forward
                        </span>
                    </button>
                </div>
            </form>
            <div class="relative flex items-center justify-center mb-stack-md w-full mt-stack-md">
                <div aria-hidden="true" class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-outline-variant"></div>
                </div>
                <div class="relative bg-surface-container-lowest px-4 text-sm text-on-surface-variant">
                    O continuar con
                </div>
            </div>
            <div class="flex flex-col gap-unit mb-stack-md w-full">
                <button id="googleLoginBtn"
                    class="w-full flex items-center justify-center gap-gutter bg-surface-container-lowest border border-outline-variant text-on-surface font-label-md text-label-md rounded-lg py-3 px-4 hover:bg-surface transition-colors active:scale-[0.98]"
                    type="button">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                        <path
                            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                            fill="#4285F4"></path>
                        <path
                            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                            fill="#34A853"></path>
                        <path
                            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                            fill="#FBBC05"></path>
                        <path
                            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                            fill="#EA4335"></path>
                    </svg>
                    Google
                </button>

            </div>
        </div>
        <!-- Footer Link -->
        <div class="mt-stack-md text-center">
            <p class="text-body-md font-body-md text-on-surface-variant">
                ¿No tienes una cuenta?
                <a class="text-primary font-label-md font-semibold hover:underline decoration-2 underline-offset-4 transition-all"
                    href="registro.html">
                    Regístrate
                </a>
            </p>
        </div>
    </main>
    <script type="module" src="assets/js/main.js"></script>
</body>

</html>
