<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Probit - Registro</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
    <script src="js/tailwind.config.js"></script>
</head>

<body
    class="bg-background text-on-background min-h-screen flex flex-col font-body-md antialiased selection:bg-primary-container selection:text-on-primary-container">
    <!-- TopAppBar -->
    <header
        class="w-full top-0 bg-background flex justify-between items-center px-container-padding h-16 max-w-max-width mx-auto">
        <div class="flex items-center gap-6">
            <!-- Botón Volver -->
            <a href="index.html"
                class="flex items-center gap-2 text-on-surface-variant hover:text-primary transition-colors p-2 -ml-2 rounded-full"
                aria-label="Volver al inicio">
                <span class="material-symbols-outlined">arrow_back</span>
                <span class="hidden sm:inline font-label-md text-label-md font-medium">Volver</span>
            </a>
            
            <!-- Logo y Marca -->
            <div class="flex items-center gap-gutter cursor-pointer">
                <img alt="Probit Logo" class="h-8 w-8 rounded-lg object-contain" src="assets/img/logo.png">
                <span class="font-headline-md text-headline-md font-semibold text-primary">Probit</span>
            </div>
        </div>
        <div class="flex items-center gap-unit text-primary">
            <span
                class="material-symbols-outlined cursor-pointer hover:text-primary transition-colors active:opacity-70"
                data-icon="help_outline">help_outline</span>
        </div>
    </header>
    <!-- Main Content -->
    <main class="flex-grow flex items-center justify-center p-container-padding w-full max-w-max-width mx-auto">
        <div
            class="bg-surface-container-lowest w-full max-w-md rounded-xl p-8 shadow-[0_4px_12px_rgba(0,0,0,0.05)] border border-surface-variant/50">
            <div class="text-center mb-stack-md">
                <h1
                    class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-on-surface mb-unit">
                    Crear cuenta</h1>
                <p class="font-body-md text-body-md text-on-surface-variant">Empieza tu camino hacia un enfoque sereno.
                </p>
            </div>
            <form id="registroForm" class="space-y-stack-sm mb-stack-md">
                <div class="flex flex-col gap-1">
                    <label class="font-label-md text-label-md text-on-surface" for="name">Nombre completo</label>
                    <input
                        class="w-full bg-surface text-on-surface border border-outline-variant rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary-container focus:border-transparent transition-shadow placeholder-on-surface-variant/50"
                        id="name" name="name" placeholder="Ej. Ana García" type="text" required>
                </div>
                <div class="flex flex-col gap-1">
                    <label class="font-label-md text-label-md text-on-surface" for="email">Correo electrónico</label>
                    <input
                        class="w-full bg-surface text-on-surface border border-outline-variant rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary-container focus:border-transparent transition-shadow placeholder-on-surface-variant/50"
                        id="email" name="email" placeholder="tu@correo.com" type="email" required>
                </div>
                <div class="flex flex-col gap-1">
                    <label class="font-label-md text-label-md text-on-surface" for="password">Contraseña</label>
                    <div class="relative">
                        <input
                            class="w-full bg-surface text-on-surface border border-outline-variant rounded-lg pl-4 pr-12 py-3 focus:outline-none focus:ring-2 focus:ring-primary-container focus:border-transparent transition-shadow placeholder-on-surface-variant/50"
                            id="password" name="password" placeholder="Mínimo 8 caracteres" type="password" required
                            pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z])(?=.*[\W_]).{8,}"
                            title="La contraseña debe tener al menos 8 caracteres, incluyendo una mayúscula, una minúscula, un número y un carácter especial.">
                        <button type="button" id="togglePassword"
                            class="absolute inset-y-0 right-0 flex items-center pr-4 text-on-surface-variant hover:text-primary transition-colors focus:outline-none">
                            <span class="material-symbols-outlined" id="togglePasswordIcon">visibility_off</span>
                        </button>
                    </div>
                </div>
                <div class="pt-stack-sm">
                    <button
                        class="w-full bg-primary text-on-primary font-label-md text-label-md rounded-lg py-3 px-4 hover:bg-on-primary-container transition-colors active:scale-[0.98]"
                        type="submit">
                        Crear cuenta
                    </button>
                </div>
            </form>
            <div class="relative flex items-center justify-center mb-stack-md">
                <div aria-hidden="true" class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-outline-variant"></div>
                </div>
                <div class="relative bg-surface-container-lowest px-4 text-sm text-on-surface-variant">
                    O continuar con
                </div>
            </div>
            <div class="flex flex-col gap-unit mb-stack-md">
                <button id="googleLoginBtn"
                    class="w-full flex items-center justify-center gap-gutter bg-surface-container-lowest border border-outline-variant text-on-surface font-label-md text-label-md rounded-lg py-3 px-4 hover:bg-surface transition-colors active:scale-[0.98]"
                    type="button">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                        <path
                            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                            fill="#4285F4"></path>
                        <path
                            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                            fill="#34A853"></path>
                        <path
                            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                            fill="#FBBC05"></path>
                        <path
                            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                            fill="#EA4335"></path>
                    </svg>
                    Google
                </button>


            </div>
            <div class="text-center">
                <a class="font-body-md text-body-md text-on-surface-variant hover:text-primary transition-colors"
                    href="inicio-sesion.html">
                    ¿Ya tienes una cuenta? <span class="font-semibold text-primary">Iniciar sesión</span>
                </a>
            </div>
        </div>
    </main>


    <script type="module" src="assets/js/main.js"></script>
</body>

</html>
